<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pico Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
      }
      button {
        padding: 10px 16px;
        font-size: 16px;
        cursor: pointer;
      }
      .card {
        border: 1px solid #ccc;
        border-radius: 10px;
        padding: 16px;
        max-width: 420px;
      }
      .value {
        font-size: 24px;
        font-weight: bold;
      }
      pre {
        background: #f5f5f5;
        padding: 12px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Pico W Control</h2>

      <p>
        Knob value:
        <span id="knob" class="value">--</span>
      </p>

      <p>
        LED state:
        <span id="led" class="value">--</span>
      </p>

      <button id="toggleBtn">Toggle LED</button>

      <h3>Latest raw state</h3>
      <pre id="raw">(waiting...)</pre>
    </div>

    <script>
      const knobEl = document.getElementById("knob");
      const ledEl = document.getElementById("led");
      const rawEl = document.getElementById("raw");
      const toggleBtn = document.getElementById("toggleBtn");

      async function refreshState() {
        try {
          const res = await fetch("/api/state");
          const data = await res.json();

          knobEl.textContent = data.knob ?? "--";
          ledEl.textContent = data.led === 1 ? "ON" : data.led === 0 ? "OFF" : "--";
          rawEl.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          rawEl.textContent = "Error loading state: " + err;
        }
      }

      toggleBtn.addEventListener("click", async () => {
        try {
          await fetch("/api/command", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ type: "LED_TOGGLE" })
          });
        } catch (err) {
          rawEl.textContent = "Error sending command: " + err;
        }
      });

      refreshState();
      setInterval(refreshState, 1000);
    </script>
  </body>
</html>
