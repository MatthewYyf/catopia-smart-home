<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pico Test: LED + Knob</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
      button { padding: 12px 16px; font-size: 16px; cursor: pointer; }
      .row { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
      .pill { display:inline-block; padding: 2px 10px; border-radius: 999px; background:#eee; font-size:12px; }
      pre { margin-top: 16px; padding: 12px; background: #f7f7f7; border-radius: 10px; overflow:auto; }
      .big { font-size: 20px; font-weight: 700; }
      .muted { color:#666; font-size: 13px; }
    </style>
  </head>
  <body>
    <h2>Pico Test Page</h2>
    <div class="muted">
      Button sends <code>POST /api/command</code> with <code>{"type":"LED_TOGGLE"}</code>.
      WebSocket listens on <code>/ws</code> for knob updates.
      <span id="wsStatus" class="pill">WS: connecting…</span>
    </div>

    <div class="row">
      <button id="toggleBtn">Toggle LED</button>
      <div>
        Knob: <span id="knobValue" class="big">—</span>
      </div>
    </div>

    <pre id="log">(waiting for websocket data…)</pre>

    <script>
      const wsStatusEl = document.getElementById("wsStatus");
      const knobValueEl = document.getElementById("knobValue");
      const logEl = document.getElementById("log");
      const toggleBtn = document.getElementById("toggleBtn");

      function logLine(msg) {
        const ts = new Date().toLocaleTimeString();
        logEl.textContent = `[${ts}] ${msg}\n` + logEl.textContent;
      }

      // ---- LED toggle button -> backend REST ----
      toggleBtn.addEventListener("click", async () => {
        toggleBtn.disabled = true;
        try {
          const res = await fetch("/api/command", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: "c-" + Date.now(), type: "LED_TOGGLE" })
          });

          if (!res.ok) {
            const text = await res.text();
            throw new Error(`HTTP ${res.status}: ${text}`);
          }
          logLine("Sent LED_TOGGLE");
        } catch (e) {
          logLine("ERROR sending LED_TOGGLE: " + e.message);
          alert(e.message);
        } finally {
          toggleBtn.disabled = false;
        }
      });

      // ---- WebSocket -> knob data ----
      function connectWs() {
        const proto = location.protocol === "https:" ? "wss" : "ws";
        const ws = new WebSocket(`${proto}://${location.host}/ws`);

        ws.onopen = () => {
          wsStatusEl.textContent = "WS: connected";
          logLine("WebSocket connected");
        };

        ws.onclose = () => {
          wsStatusEl.textContent = "WS: disconnected (retrying…)";
          logLine("WebSocket disconnected; retrying…");
          setTimeout(connectWs, 800);
        };

        ws.onerror = () => {
          wsStatusEl.textContent = "WS: error";
          logLine("WebSocket error");
        };

        ws.onmessage = (event) => {
          // Expect JSON like: {"knob":123} OR {"sensor":{"knob":123}} etc.
          try {
            const data = JSON.parse(event.data);

            let knob = null;
            if (typeof data.knob === "number") knob = data.knob;
            else if (data.sensor && typeof data.sensor.knob === "number") knob = data.sensor.knob;
            else if (data.sensors && typeof data.sensors.knob === "number") knob = data.sensors.knob;

            if (knob !== null) {
              knobValueEl.textContent = knob;
            }

            logLine("WS recv: " + JSON.stringify(data));
          } catch {
            // If backend sends non-JSON, just log raw text
            logLine("WS recv (raw): " + event.data);
          }
        };
      }

      connectWs();
    </script>
  </body>
</html>
